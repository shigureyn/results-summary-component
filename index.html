<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  <link rel="stylesheet" href="./css/style.css">
  <script src="./js/main.js" defer></script>
  <title>Results summary</title>
</head>

<body>
  <main class="main">
    <section class="results-card" aria-labelledby="results-title">
      <h1 class="sr-only" id="results-title">Test results summary</h1>

      <div class="results-card__result">
        <h2 class="results-card__title">Your Result</h2>

        <p class="score">
          <strong class="score-value">76</strong>
          <span class="score-max">of 100</span>
        </p>

        <p class="results-card__rating">Great</p>

        <p class="results-card__description">
          You scored higher than 65% of the people who have taken these tests.
        </p>
      </div>

      <div class="results-card__summary">
        <h2 class="summary-title">Summary</h2>

        <ul class="summary-list"></ul>

        <button class="summary-button" type="button">
          Continue
        </button>
      </div>
    </section>

  </main>
  <footer class="attribution">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge" class="attribution-link">Frontend Mentor</a>.
    Coded by <a href="https://github.com/shigureyn" class="attribution-link">Shigureyn</a>.
  </footer>
</body>

</html>
